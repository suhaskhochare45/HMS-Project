spring.application.name=ers-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ers_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:manager}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080